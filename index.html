<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Implant Center — Sistema de Facturación</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22%230D9488%22/><text x=%2216%22 y=%2222%22 font-size=%2218%22 text-anchor=%22middle%22 fill=%22white%22>D</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0369A1;
  --navy-2:#0C4A6E;
  --navy-3:#0EA5E9;
  --sky-50:#F0F9FF;
  --sky-100:#E0F2FE;
  --sky-200:#BAE6FD;
  --teal:#0D9488;
  --teal-dark:#0B7A70;
  --teal-light:#E6FBF8;
  --amber:#D9822B;
  --amber-dark:#B96A1D;
  --amber-light:#FCEEDD;
  --ink:#0E1B26;
  --slate:#5C7185;
  --slate-light:#8DA0B3;
  --bg:#F3F6F8;
  --card:#FFFFFF;
  --border:#E3E9EE;
  --danger:#D34848;
  --danger-light:#FBE9E9;
  --ok:#1E9E6B;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(14,27,38,.04), 0 8px 24px -8px rgba(14,27,38,.10);
  --font-d:'Sora',sans-serif;
  --font-b:'Inter',sans-serif;
  --font-m:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-b);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:14px;}
::selection{background:var(--teal-light);color:var(--teal-dark);}
.hidden{display:none !important;}
a{color:inherit;}

/* ---------- LOGIN ---------- */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 12% 8%, rgba(255,255,255,.55), transparent 40%),
    radial-gradient(circle at 88% 12%, rgba(13,148,136,.30), transparent 45%),
    radial-gradient(circle at 20% 92%, rgba(255,255,255,.30), transparent 40%),
    radial-gradient(circle at 90% 88%, rgba(217,130,43,.22), transparent 45%),
    linear-gradient(135deg, var(--sky-200) 0%, #7DD3FC 45%, #38BDF8 100%);
  padding:24px;
}
.login-card{
  width:100%;max-width:940px;background:var(--card);border-radius:28px;
  box-shadow:0 40px 90px -24px rgba(3,105,161,.45), 0 0 0 1px rgba(255,255,255,.5);
  display:grid;grid-template-columns:1fr 1fr;overflow:hidden;
}
.login-side{
  background:linear-gradient(160deg,var(--navy) 0%, var(--navy-3) 100%);
  color:#fff;padding:48px 40px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;
}
.login-side::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 100% 0%, rgba(255,255,255,.16), transparent 55%);
  pointer-events:none;
}
.login-side::after{
  content:"";position:absolute;right:-60px;bottom:-60px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle, rgba(13,148,136,.55), transparent 70%);
}
.brand-mark{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.tooth-logo{width:40px;height:40px;flex:0 0 auto;}
.brand-name{font-family:var(--font-d);font-weight:700;font-size:19px;letter-spacing:.2px;}
.brand-sub{font-size:11.5px;color:var(--sky-100);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;opacity:.85;}
.login-quote{position:relative;z-index:1;font-family:var(--font-d);font-size:27px;font-weight:600;line-height:1.35;margin-top:40px;}
.login-quote span{color:var(--teal-light);}
.login-foot{position:relative;z-index:1;font-size:12.5px;color:var(--sky-100);opacity:.8;margin-top:40px;}
.login-main{padding:48px 40px;display:flex;flex-direction:column;}
.login-main h1{font-family:var(--font-d);font-size:25px;font-weight:800;margin-bottom:4px;letter-spacing:-.2px;}
.login-main p.desc{color:var(--slate);font-size:13.5px;margin-bottom:28px;}
.role-list{display:flex;flex-direction:column;gap:12px;}
.role-card{
  display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid var(--border);
  border-radius:14px;text-align:left;transition:.18s;background:#fff;
}
.role-card:hover{border-color:var(--navy-3);box-shadow:0 10px 26px -10px rgba(3,105,161,.35);transform:translateY(-2px);}
.role-icon{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}
.role-icon.adm{background:linear-gradient(160deg,var(--navy),var(--navy-3));color:#fff;}
.role-icon.caj{background:var(--teal-light);color:var(--teal-dark);}
.role-name{font-weight:600;font-size:14.5px;}
.role-desc{font-size:12.5px;color:var(--slate);margin-top:1px;}
.role-arrow{margin-left:auto;color:var(--slate-light);}
.login-note{margin-top:24px;font-size:11.5px;color:var(--slate-light);text-align:center;}

/* ---------- SHELL ---------- */
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex:0 0 auto;background:var(--navy);color:#fff;display:flex;flex-direction:column;
  padding:20px 14px;position:sticky;top:0;height:100vh;
}
.sb-brand{display:flex;align-items:center;justify-content:center;padding:4px 4px 20px;}
.sb-brand-logo-frame{
  width:100%;height:108px;background:#fff;border-radius:12px;overflow:hidden;position:relative;
  box-shadow:0 0 0 1px rgba(255,255,255,.24),0 8px 20px -12px rgba(0,0,0,.38);
}
.sb-brand-logo{
  display:block;width:100%;height:auto;position:absolute;left:0;top:0;transform:translateY(-22.5%);
}
.sb-nav{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.sb-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;
  color:var(--slate-light);transition:.12s;
}
.sb-item svg{flex:0 0 auto;opacity:.85;}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.sb-item.active{background:var(--teal);color:#fff;}
.sb-item.active svg{opacity:1;}
.sb-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--slate-light);opacity:.6;margin:16px 12px 6px;}
.sb-spacer{flex:1;}
.sb-user{
  display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:rgba(255,255,255,.05);margin-top:8px;
}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto;}
.sb-user-name{font-size:12.5px;font-weight:600;line-height:1.2;}
.sb-user-role{font-size:10.5px;color:var(--slate-light);}
.sb-logout{margin-top:8px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border-radius:10px;background:rgba(255,255,255,.06);font-size:12.5px;color:var(--slate-light);}
.sb-logout:hover{background:rgba(211,72,72,.18);color:#ff9d9d;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  height:66px;flex:0 0 auto;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:30;
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.page-title{font-family:var(--font-d);font-weight:700;font-size:17px;}
.page-sub{font-size:11.5px;color:var(--slate);margin-top:1px;}

.icon-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--slate);}
.icon-btn:hover{background:var(--bg);}
.content{flex:1;padding:26px;max-width:1400px;width:100%;margin:0 auto;}

/* ---------- shared bits ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:22px;}
.dashboard-kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:18px;}
.cash-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:18px;}
.cafe-kpis{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px;margin-bottom:18px;}
.cafe-kpis .kpi-card{padding:14px 15px;min-width:0;}
.cafe-kpis .kpi-label{font-size:11px;}
.cafe-kpis .kpi-value{font-size:21px;white-space:nowrap;}
.cash-status{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.cash-status-main{flex:1;min-width:220px;}
.cash-state{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;padding:6px 11px;border-radius:999px;}
.cash-state::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;}
.cash-state.open{background:#EAF6EC;color:var(--ok);}
.cash-state.closed{background:var(--danger-light);color:var(--danger);}
.cash-close-result{font-family:var(--font-d);font-size:15px;font-weight:700;text-align:center;padding:12px;border-radius:11px;background:var(--bg);}
.cash-close-result.surplus{background:#EAF6EC;color:var(--ok);}
.cash-close-result.shortage{background:var(--danger-light);color:var(--danger);}
.kpi-card-interactive{cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;}
.kpi-card-interactive:hover{transform:translateY(-2px);border-color:#bfd0ee;box-shadow:0 14px 30px -20px rgba(14,27,38,.45);}
.kpi-card-interactive:focus-visible{outline:3px solid rgba(37,99,235,.22);outline-offset:3px;border-color:var(--navy-3);}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.kpi-label{font-size:12px;color:var(--slate);font-weight:600;display:flex;align-items:center;gap:8px;}
.kpi-value{font-family:var(--font-d);font-size:26px;font-weight:700;margin-top:8px;}
.kpi-value small{font-size:13px;font-weight:600;color:var(--slate);}
.kpi-delta{font-size:11.5px;margin-top:6px;font-weight:600;}
.kpi-delta.up{color:var(--ok);}
.kpi-delta.flat{color:var(--slate);}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.card-title{font-family:var(--font-d);font-weight:700;font-size:15px;}
.card-body{padding:18px 20px;}

.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.bar-label{width:110px;font-size:12.5px;font-weight:600;color:var(--slate);flex:0 0 auto;}
.bar-track{flex:1;background:var(--bg);border-radius:8px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;}
.bar-val{width:70px;text-align:right;font-family:var(--font-m);font-size:12px;font-weight:600;flex:0 0 auto;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--slate);font-weight:700;padding:10px 12px;border-bottom:1.5px solid var(--border);}
td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg);}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:700;}
.tag-efectivo{background:#EAF6EC;color:var(--ok);}
.tag-tarjeta{background:#EAF0FB;color:#3457D5;}
.tag-transferencia{background:#EDE9FE;color:#6D28D9;}
.tag-mixto{background:#FFF4DB;color:#9A5B00;}
.tag-admin{background:var(--navy);color:#fff;}
.tag-cajero{background:var(--bg);color:var(--slate);border:1px solid var(--border);}
.mono{font-family:var(--font-m);}
.muted{color:var(--slate);}
.empty-state{padding:40px 20px;text-align:center;color:var(--slate);}
.empty-state svg{margin-bottom:10px;opacity:.5;}
.empty-state div.t{font-weight:600;color:var(--ink);font-size:13.5px;margin-bottom:3px;}
.empty-state div.s{font-size:12px;}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;transition:.12s;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal-dark);}
.btn-amber{background:var(--amber);color:#fff;}
.btn-amber:hover{background:var(--amber-dark);}
.btn-ghost{background:var(--bg);color:var(--ink);}
.btn-ghost:hover{background:var(--border);}
.btn-outline{border:1.5px solid var(--border);color:var(--ink);}
.btn-outline:hover{border-color:var(--slate);}
.btn-danger{color:var(--danger);}
.btn-danger:hover{background:var(--danger-light);}
.btn-sm{padding:7px 12px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--slate);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;background:#fff;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.pay-toggle{display:flex;gap:10px;}
.pay-opt{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:700;font-size:13px;}
.pay-opt.sel{border-color:var(--teal);background:var(--teal-light);color:var(--teal-dark);}
.pay-opt svg{opacity:.85;}

.search-box{display:flex;align-items:center;gap:8px;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;background:#fff;}
.search-box input{border:none;flex:1;font-size:13px;}
.search-box input:focus{outline:none;}
.patient-search-wrap{padding:16px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fff 0%,#fbfcfe 100%);}
.patient-search-box{max-width:620px;transition:border-color .18s,box-shadow .18s;}
.patient-search-box:focus-within{border-color:var(--navy-3);box-shadow:0 0 0 3px rgba(37,99,235,.10);}
.patient-search-box svg{color:var(--navy-3);flex:0 0 auto;}

/* invoice module */
.svc-list{max-height:340px;overflow:auto;display:flex;flex-direction:column;gap:6px;}
.svc-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:10px;}
.svc-item:hover{border-color:var(--teal);}
.svc-name{font-size:13px;font-weight:600;}
.svc-price{font-family:var(--font-m);font-size:12.5px;color:var(--slate);}
.cart-line{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);}
.cart-line:last-child{border-bottom:none;}
.cart-qty{display:flex;align-items:center;gap:6px;}
.qty-btn{width:22px;height:22px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;}
.qty-btn:hover{background:var(--border);}
.cart-total-row{display:flex;justify-content:space-between;padding-top:12px;margin-top:8px;border-top:1.5px dashed var(--border);font-family:var(--font-d);font-weight:700;font-size:16px;}
.charge-box{margin-top:14px;padding:14px;border:1px solid var(--border);border-radius:14px;background:#FBFCFD;}
.charge-title{font-family:var(--font-d);font-size:13px;font-weight:700;margin-bottom:12px;}
.charge-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
.charge-grid .field{margin-bottom:0;}
.charge-summary{margin-top:12px;padding-top:10px;border-top:1px dashed var(--border);display:flex;flex-direction:column;gap:7px;}
.charge-summary-row{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;}
.charge-summary-row strong{font-family:var(--font-m);}
.mixed-payment{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.mixed-payment-card{padding:11px;border:1px solid var(--border);border-radius:11px;background:#fff;}
.mixed-payment-label{font-size:11.5px;font-weight:700;color:var(--slate);margin-bottom:8px;}
.mixed-payment-card .field:last-child{margin-bottom:0;}

/* POS grid */
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.pos-prod-wrap{position:relative;min-width:0;}
.pos-prod{
  width:100%;height:100%;min-height:138px;background:#fff;border:1.5px solid var(--border);border-radius:14px;
  padding:14px 12px;text-align:left;display:flex;flex-direction:column;gap:6px;transition:.12s;
}
.pos-prod:hover{border-color:var(--amber);transform:translateY(-2px);box-shadow:0 8px 20px -10px rgba(217,130,43,.4);}
.pos-prod:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none;border-color:var(--border);}
.pos-prod .pi{width:36px;height:36px;border-radius:9px;background:var(--amber-light);color:var(--amber-dark);display:flex;align-items:center;justify-content:center;}
.pos-prod .pn{font-size:12.5px;font-weight:700;line-height:1.25;}
.pos-prod .pp{font-family:var(--font-m);font-size:12px;color:var(--slate);}
.pos-prod-status{margin-top:auto;align-self:flex-start;}
.pos-prod-actions{position:absolute;top:8px;right:8px;z-index:2;display:flex;gap:4px;}
.pos-prod-action{
  width:26px;height:26px;border-radius:7px;background:#fff;border:1px solid var(--border);color:var(--slate);
  display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px -6px rgba(14,27,38,.35);
}
.pos-prod-action:hover{border-color:var(--slate-light);color:var(--ink);}
.pos-prod-action.delete:hover{border-color:var(--danger);background:var(--danger-light);color:var(--danger);}
.pos-cat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--slate);font-weight:700;margin:16px 0 8px;}
.pos-cat-label:first-child{margin-top:0;}

/* receipt */
.receipt{
  font-family:var(--font-m);font-size:12.5px;color:var(--ink);background:#fff;padding:22px 20px;
  position:relative;
}
.receipt::before{
  content:"";position:absolute;top:-8px;left:0;right:0;height:16px;
  background-image:radial-gradient(circle, var(--bg) 5px, transparent 5.5px);
  background-size:20px 16px;background-repeat:repeat-x;background-position:top center;
}
.receipt-head{text-align:center;margin-bottom:14px;}
.receipt-head .rb{font-family:var(--font-d);font-weight:700;font-size:15px;}
.receipt-head .rs{font-size:11px;color:var(--slate);margin-top:2px;}
.receipt-row{display:flex;justify-content:space-between;padding:4px 0;}
.receipt-div{border-top:1px dashed var(--border);margin:10px 0;}
.receipt-total{display:flex;justify-content:space-between;font-weight:700;font-size:15px;padding-top:8px;}
.receipt-rx-logo{display:block;width:100%;max-width:230px;max-height:82px;object-fit:contain;margin:0 auto 12px;}
.print-contact{font-size:9.5px;line-height:1.4;color:var(--slate);overflow-wrap:anywhere;word-break:break-word;}
.print-contact strong{color:var(--ink);font-weight:700;}
.print-contact-ticket{padding:9px 0;text-align:left;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);}
.print-contact-ticket>div{display:block;margin:2px 0;}
.print-contact-letter{display:flex;flex-wrap:wrap;gap:4px 18px;padding:10px 14px;margin:0 0 16px;background:#f8fafc;border:1px solid var(--border);border-radius:10px;}
.print-contact-letter>div{flex:1 1 280px;}
.print-document-title{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.print-document-sub{font-size:11.5px;color:var(--slate);margin-bottom:10px;}

/* modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(11,27,43,.55);display:flex;align-items:center;justify-content:center;
  z-index:200;padding:20px;backdrop-filter:blur(2px);
}
.modal{background:#fff;border-radius:20px;max-width:460px;width:100%;box-shadow:0 30px 80px -20px rgba(0,0,0,.4);max-height:90vh;overflow:auto;}
.modal.wide{max-width:600px;}
.modal-head{display:flex;align-items:center;justify-content:between;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);}
.modal-title{font-family:var(--font-d);font-weight:700;font-size:16px;}
.modal-body{padding:20px 22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border);}

.toast{
  position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:14px 18px;border-radius:12px;
  display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;box-shadow:0 20px 50px -10px rgba(0,0,0,.4);
  z-index:300;animation:toastIn .18s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.toast .ok-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);}

.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.chip{padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:700;border:1.5px solid var(--border);color:var(--slate);}
.chip.sel{background:var(--navy);color:#fff;border-color:var(--navy);}

/* agenda */
.tag-pendiente{background:var(--amber-light);color:var(--amber-dark);}
.tag-confirmada{background:#EAF0FB;color:#3457D5;}
.tag-completada{background:#EAF6EC;color:var(--ok);}
.tag-cancelada{background:var(--danger-light);color:var(--danger);}
.day-strip{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px;}
.day-chip{
  flex:0 0 auto;min-width:64px;padding:10px 8px;border-radius:14px;border:1.5px solid var(--border);background:#fff;
  text-align:center;display:flex;flex-direction:column;gap:3px;
}
.day-chip:hover{border-color:var(--teal);}
.day-chip.sel{background:var(--navy);border-color:var(--navy);color:#fff;}
.day-chip .dname{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;opacity:.7;}
.day-chip .dnum{font-family:var(--font-d);font-weight:700;font-size:16px;}
.day-chip .dcount{font-size:10px;font-weight:700;color:var(--teal);}
.day-chip.sel .dcount{color:#7CE0D3;}
.agenda-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.agenda-date-title{font-family:var(--font-d);font-weight:700;font-size:16px;flex:1;}
.appt-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--border);border-radius:14px;margin-bottom:10px;}
.appt-time{font-family:var(--font-m);font-weight:700;font-size:14px;width:58px;flex:0 0 auto;color:var(--navy);}
.appt-main{flex:1;min-width:0;}
.appt-patient{font-weight:700;font-size:13.5px;}
.appt-meta{font-size:11.5px;color:var(--slate);margin-top:2px;}
.appt-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}

/* patient clinical history */
.patient-detail-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.patient-detail-heading{flex:1;min-width:0;}
.patient-detail-title{font-family:var(--font-d);font-size:19px;font-weight:700;}
.patient-detail-sub{font-size:12px;color:var(--slate);margin-top:2px;}
.patient-detail-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.patient-info-row{display:grid;grid-template-columns:155px minmax(0,1fr);gap:14px;padding:10px 0;border-bottom:1px solid var(--border);}
.patient-info-row:last-child{border-bottom:none;}
.patient-info-label{font-size:11.5px;font-weight:700;color:var(--slate);}
.patient-info-value{font-size:13px;color:var(--ink);white-space:pre-wrap;overflow-wrap:anywhere;}
.patient-history-table td{vertical-align:top;line-height:1.4;}
.patient-history-table .clinical-actions{display:flex;gap:6px;}

/* radiography brand */
.radiography-brand{
  min-height:116px;margin-bottom:18px;padding:14px 24px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;
}
.radiography-brand-logo{
  display:block;width:100%;max-width:420px;max-height:88px;object-fit:contain;object-position:center;
}

@page{margin:6mm;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{position:absolute;top:0;left:0;width:72mm;max-width:100%;box-sizing:border-box;}
  #printArea.print-letter{width:100%;max-width:none;position:absolute;padding:0;font-size:10px;}
  #printArea.print-letter .grid-2{grid-template-columns:1fr 1fr;gap:10px;}
  #printArea.print-letter .card{box-shadow:none;break-inside:avoid;border-color:#cbd5e1;}
  #printArea.print-letter .card-head{padding:10px 12px;}
  #printArea.print-letter .card-body{padding:10px 12px;}
  #printArea.print-letter table{font-size:8.5px;}
  #printArea.print-letter th,#printArea.print-letter td{padding:7px 8px;}
  #printArea .no-print,#printArea .no-print *{display:none!important;}
  .print-contact{color:#334155!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
@media (max-width:980px){
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}
  .login-card{grid-template-columns:1fr;}
  .login-side{display:none;}
  .radiography-brand{min-height:100px;padding:12px 16px;}
  .radiography-brand-logo{max-width:360px;max-height:72px;}
  .patient-detail-head{align-items:flex-start;flex-wrap:wrap;}
  .patient-detail-actions{width:100%;}
  .patient-info-row{grid-template-columns:1fr;gap:3px;}
  .dashboard-kpis{grid-template-columns:repeat(2,minmax(0,1fr));}
  .cash-kpis{grid-template-columns:repeat(2,minmax(0,1fr));}
  .cafe-kpis{grid-template-columns:repeat(3,minmax(0,1fr));}
}
@media (max-width:620px){
  .dashboard-kpis,.cash-kpis,.charge-grid,.mixed-payment{grid-template-columns:1fr;}
  .cafe-kpis{grid-template-columns:repeat(2,minmax(0,1fr));}
  .pay-toggle{flex-wrap:wrap;}
  .pay-opt{flex:1 1 calc(50% - 10px);}
}
@media (max-width:390px){.cafe-kpis{grid-template-columns:1fr;}}
</style>

  return (USERS.find(u=>u.role==='cajero_radiografias')||USERS.find(u=>u.role==='cajero_clinica')||USERS[0]).name;

function radiographyServices(source=DB){
  return (source.services||[]).filter(service=>service.type==='radiografia').sort((a,b)=>a.name.localeCompare(b.name));
}
function normalizeRadiography(record,idx,services=[]){
  const methods = ['efectivo','tarjeta','transferencia','mixto'];
  const service = services.find(item=>Number(item.id)===Number(record.serviceId) && item.type==='radiografia')
    || services.find(item=>item.type==='radiografia' && item.name===record.study);
  const catalogPrice = service && Number.isFinite(Number(service.price)) ? Number(service.price) : null;
  const paymentStatus=record.paymentStatus||(record.status==='archivada'?'anulado':record.status==='revision'?'pendiente':'pagado');
  return {
    ...record,
    key:record.key||Date.now()+idx,
    receiptNo:record.receiptNo||`RX-T-${String(idx+1).padStart(4,'0')}`,
    serviceId:service ? service.id : (record.serviceId||null),
    study:service ? service.name : record.study,
    price:catalogPrice!==null ? catalogPrice : Number(record.price||0),
    method:record.method||methods[idx%methods.length],
    paymentStatus,
    paymentDate:paymentStatus==='pagado' ? Number(record.paymentDate||record.date||Date.now()) : null,
    cashier:record.cashier||defaultRadiographyCashier(),
    notes:record.notes||'',
  };
}

function normalizeDB(db){
  db.settings = {...DEFAULT_SETTINGS,...(db.settings||{})};
  const configuredRate = Number(db.settings.exchangeRate);
  db.settings.exchangeRate = Number.isFinite(configuredRate) && configuredRate>0 ? configuredRate : DEFAULT_SETTINGS.exchangeRate;
  if(!Array.isArray(db.cashSessions)) db.cashSessions=[];
  if(!Array.isArray(db.expenses)) db.expenses=[];
  db.nextCashSessionNo=Math.max(Number(db.nextCashSessionNo)||1,db.cashSessions.length+1);
  db.nextExpenseNo=Math.max(Number(db.nextExpenseNo)||1,...db.expenses.map(expense=>(Number(String(expense.id||'').split('-').pop())||0)+1));
  const ensurePayment=(record,total,isPaid=true)=>{
    const existing=record.payment||{};
    const currency=existing.currency==='usd'?'usd':'nio';
    const rate=Number(existing.exchangeRate)>0?Number(existing.exchangeRate):db.settings.exchangeRate;
    const totalInCurrency=currency==='usd'?Math.round(Number(total||0)/rate*100)/100:Math.round(Number(total||0)*100)/100;
    record.payment={currency,exchangeRate:rate,totalInCurrency,received:isPaid?totalInCurrency:0,change:0,mixedPayments:[],...existing};
  };
  if(!Array.isArray(db.users)||!db.users.length){ db.users = USERS.map(user=>({...user})); }
  let generalAdminAssigned=false;
  db.users=db.users.map((user,index)=>{
    let role=normalizeUserRole(user.role,user);
    if(role==='admin_general'){
      if(generalAdminAssigned) role='cajero_clinica';
      else generalAdminAssigned=true;
    }
    return {...user,id:user.id??Date.now()+index,role,password:typeof user.password==='string'&&user.password.length?user.password:DEFAULT_USER_PASSWORD};
  });
  if(!generalAdminAssigned && db.users.length) db.users[0].role='admin_general';
  if(!db.patients){ db.patients = []; }
  db.patients = db.patients.map(patient=>normalizePatientProfile(patient));
  if(!db.clinicalEntries){ db.clinicalEntries = CLINICAL_ENTRY_EXAMPLES.map(entry=>({...entry})); }
  if(!db.services){ db.services = DENTAL_SERVICES.map(s=>({...s,type:'dental'})); }
  db.services = db.services.filter(service=>service.name!=='Radiografía dental').map(service=>({
    ...service,
    type:service.type==='radiografia'?'radiografia':'dental',
  }));
  if(!db.serviceCatalogLinkedRadiographyV1){
    RADIOGRAPHY_SERVICE_SEED.forEach(seed=>{
      const existing = db.services.find(service=>service.name===seed.name);
      if(existing){ existing.type='radiografia'; }
      else{
        const nextId = Math.max(0,...db.services.map(service=>Number(service.id)||0),(Number(db.nextServiceId)||1)-1)+1;
        db.services.push({...seed,id:nextId});
      }
    });
    db.serviceCatalogLinkedRadiographyV1 = true;
  }
  db.nextServiceId = Math.max(Number(db.nextServiceId)||1,...db.services.map(service=>(Number(service.id)||0)+1));
  if(!db.invoices) db.invoices=[];
  db.invoices.forEach(invoice=>{
    invoice.items = invoice.items.filter(item=>item.name!=='Radiografía dental');
    invoice.total = invoice.items.reduce((sum,item)=>sum+item.price*item.qty,0);
    invoice.billingMode=invoice.billingMode==='card'?'card':'normal';
    ensurePayment(invoice,invoice.total,true);
  });
  db.nextInvoiceNo=Math.max(Number(db.nextInvoiceNo)||1,...db.invoices.filter(invoice=>invoice.billingMode!=='card').map(invoice=>(Number(String(invoice.id||'').split('-').pop())||0)+1));
  db.nextCardInvoiceNo=Math.max(Number(db.nextCardInvoiceNo)||1,...db.invoices.filter(invoice=>invoice.billingMode==='card').map(invoice=>(Number(String(invoice.id||'').split('-').pop())||0)+1));
  if(!db.posSales) db.posSales=[];
  db.posSales.forEach(sale=>ensurePayment(sale,sale.total,true));
  if(!db.products){ db.products = CAFE_PRODUCTS.map(p=>normalizeCafeProduct(p)); }
  db.products = db.products.map(p=>normalizeCafeProduct(p));
  if(!db.nextProductId){ db.nextProductId = Math.max(0,...db.products.map(p=>Number(p.id)||0))+1; }
  if(!db.radiographies){ db.radiographies = RADIOGRAPHY_STUDIES.map(r=>({...r})); }
  db.radiographies = db.radiographies.map((r,idx)=>normalizeRadiography(r,idx,db.services));
  db.radiographies.forEach(record=>ensurePayment(record,record.price,record.paymentStatus==='pagado'));
  if(!db.nextRadiographyNo){ db.nextRadiographyNo = 2049; }
  const lastReceipt = Math.max(0,...db.radiographies.map(r=>Number(String(r.receiptNo||'').split('-').pop())||0));
  db.nextRadiographyReceiptNo = Math.max(Number(db.nextRadiographyReceiptNo)||1,lastReceipt+1);
  if(!db.appointments){ db.appointments = []; }
  if(!db.nextApptNo){ db.nextApptNo = 208; }
  if(!db.singleClinicMigrationV1){
    const legacyFields = ['branch','branchId','sucursal','sucursalId'];
    ['users','patients','appointments','invoices','posSales','radiographies','expenses'].forEach(collection=>{
      (db[collection]||[]).forEach(record=>legacyFields.forEach(field=>delete record[field]));
    });
    (db.users||[]).forEach(user=>{
      if(user.username==='cajero.centro') user.username='cajero.carlos';
      if(user.username==='cajero.norte') user.username='cajero.andrea';
    });
    db.singleClinicMigrationV1 = true;
  }
  return db;
}

function createPaymentDraft(payment){
  const mixed = payment&&Array.isArray(payment.mixedPayments) ? payment.mixedPayments : [];
  return {
    currency:payment&&payment.currency==='usd'?'usd':'nio',
    received:payment&&payment.received!==undefined?String(payment.received):'',
    mixed1Method:mixed[0]&&mixed[0].method||'efectivo',
    mixed1Amount:mixed[0]&&mixed[0].amount!==undefined?String(mixed[0].amount):'',
    mixed2Method:mixed[1]&&mixed[1].method||'tarjeta',
    mixed2Amount:mixed[1]&&mixed[1].amount!==undefined?String(mixed[1].amount):'',
  };
}
function paymentDraft(prefix){ return prefix==='invoice'?S.invoicePayment:prefix==='pos'?S.posPayment:S.rxPayment; }
function resetPaymentDraft(prefix){
  const draft=createPaymentDraft();
  if(prefix==='invoice') S.invoicePayment=draft;
  else if(prefix==='pos') S.posPayment=draft;
  else S.rxPayment=draft;
  return draft;
}
function paymentTotalInCurrency(total,currency,rate=currentExchangeRate()){
  return roundMoney(currency==='usd' ? Number(total||0)/rate : Number(total||0));
}
function formatPaymentMoney(value,currency){ return currency==='usd'?usd(value):fmt(value); }
function paymentOptionHtml(value,current){
  return `<option value="${value}" ${current===value?'selected':''}>${paymentMethodLabel(value)}</option>`;
}

  const currency=draft.currency==='usd'?'usd':'nio';

  const mixedTotal=roundMoney((Number(draft.mixed1Amount)||0)+(Number(draft.mixed2Amount)||0));
  const change=method==='mixto'?0:roundMoney(Math.max(0,received-totalCurrency));
  const difference=roundMoney(totalCurrency-mixedTotal);
  const totalLabel=currency==='usd'?'Total en dólares':'Total en córdobas';
  const changeLabel=currency==='usd'?'Cambio en dólares':'Cambio';
  return `<div class="charge-box" id="${prefix}ChargeBlock">
    <div class="charge-title">Cobro</div>
    <div class="charge-grid">
      <div class="field"><label>Moneda</label><select onchange="setChargeCurrency('${prefix}',this.value,${Number(total||0)})"><option value="nio" ${currency==='nio'?'selected':''}>Córdoba</option><option value="usd" ${currency==='usd'?'selected':''}>Dólar</option></select></div>
      ${method==='mixto'?'':`<div class="field"><label>Paga con</label><input type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" value="${escapeAttr(draft.received)}" oninput="updateChargeDraft('${prefix}','received',this.value,${Number(total||0)},'${method}')"></div>`}
    </div>
    ${method==='mixto'?`<div class="mixed-payment-label" style="margin-top:10px;">Paga con</div><div class="mixed-payment">

      <div class="mixed-payment-card"><div class="mixed-payment-label">Pago 2</div><div class="field"><label>Forma de pago</label><select onchange="updateChargeDraft('${prefix}','mixed2Method',this.value,${Number(total||0)},'${method}')">${['efectivo','tarjeta','transferencia'].map(value=>paymentOptionHtml(value,draft.mixed2Method)).join('')}</select></div><div class="field"><label>Monto</label><input type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" value="${escapeAttr(draft.mixed2Amount)}" oninput="updateChargeDraft('${prefix}','mixed2Amount',this.value,${Number(total||0)},'${method}')"></div></div>
    </div>`:''}
    <div class="charge-summary">
      <div class="charge-summary-row"><span>${totalLabel}</span><strong id="${prefix}ChargeTotal">${formatPaymentMoney(totalCurrency,currency)}</strong></div>
      ${method==='mixto'?`<div class="charge-summary-row"><span>Total asignado</span><strong id="${prefix}ChargeAssigned">${formatPaymentMoney(mixedTotal,currency)}</strong></div><div class="charge-summary-row"><span>Diferencia</span><strong id="${prefix}ChargeDifference">${formatPaymentMoney(Math.abs(difference),currency)}</strong></div>`:''}
      <div class="charge-summary-row"><span>${changeLabel}</span><strong id="${prefix}ChargeChange">${formatPaymentMoney(change,currency)}</strong></div>
      ${currency==='usd'?`<div class="muted" style="font-size:10.5px;">Tipo de cambio: US$ 1.00 = ${fmt(rate)}</div>`:''}
    </div>
  </div>`;
}
function refreshChargeBlock(prefix,total,method){
  const node=document.getElementById(prefix+'ChargeBlock');
  if(node) node.outerHTML=renderChargeBlock(prefix,total,method,paymentDraft(prefix));
}
function setChargeCurrency(prefix,currency,total){
  const draft=paymentDraft(prefix);
  draft.currency=currency==='usd'?'usd':'nio';
  draft.received=''; draft.mixed1Amount=''; draft.mixed2Amount='';
  const method=prefix==='invoice'?S.invoiceMethod:prefix==='pos'?S.posMethod:S.rxMethod;
  refreshChargeBlock(prefix,total,method);
}
function updateChargeDraft(prefix,field,value,total,method){
  paymentDraft(prefix)[field]=value;
  const draft=paymentDraft(prefix);
  const currency=draft.currency;
  const totalCurrency=paymentTotalInCurrency(total,currency);
  const mixedTotal=roundMoney((Number(draft.mixed1Amount)||0)+(Number(draft.mixed2Amount)||0));
  const difference=roundMoney(totalCurrency-mixedTotal);
  const received=Number(draft.received)||0;
  const change=method==='mixto'?0:roundMoney(Math.max(0,received-totalCurrency));
  const assignedNode=document.getElementById(prefix+'ChargeAssigned');
  const differenceNode=document.getElementById(prefix+'ChargeDifference');
  const changeNode=document.getElementById(prefix+'ChargeChange');
  if(assignedNode) assignedNode.textContent=formatPaymentMoney(mixedTotal,currency);
  if(differenceNode) differenceNode.textContent=formatPaymentMoney(Math.abs(difference),currency);
  if(changeNode) changeNode.textContent=formatPaymentMoney(change,currency);
}
function setInvoiceMode(mode){
  S.invoiceMode=mode==='card'?'card':'normal';
  if(S.invoiceMode==='card') S.invoiceMethod='tarjeta';
  resetPaymentDraft('invoice');render();
}
function setInvoicePaymentMethod(method){
  if(S.invoiceMode==='card'&&method!=='tarjeta') return;
  if(!['efectivo','tarjeta','transferencia','mixto'].includes(method)) return;
  S.invoiceMethod=method;resetPaymentDraft('invoice');render();
}
function setPosPaymentMethod(method){ S.posMethod=method; resetPaymentDraft('pos'); render(); }
function setRadiographyPaymentMethod(method,total){ S.rxMethod=method; resetPaymentDraft('rx'); refreshChargeBlock('rx',total,method); }
function buildPaymentRecord(prefix,total,method,required=true){
  const draft=paymentDraft(prefix);
  const rate=currentExchangeRate();
  const currency=draft.currency==='usd'?'usd':'nio';
  const totalInCurrency=paymentTotalInCurrency(total,currency,rate);
  const base={currency,exchangeRate:rate,totalInCurrency,received:0,change:0,mixedPayments:[]};
  if(!required) return base;
  if(prefix==='invoice' && !requireOpenCashRegister()) return null;
  if(method==='mixto'){
    const first=roundMoney(draft.mixed1Amount), second=roundMoney(draft.mixed2Amount);
    if(first<=0 || second<=0){ toast('Completa los dos montos del pago mixto'); return null; }
    if(Math.abs(roundMoney(first+second-totalInCurrency))>0.01){ toast('La suma del pago mixto debe ser igual al total'); return null; }
    return {...base,received:roundMoney(first+second),mixedPayments:[{method:draft.mixed1Method,amount:first},{method:draft.mixed2Method,amount:second}]};
  }
  const received=roundMoney(draft.received);
  if(received<totalInCurrency){ toast('El monto recibido debe cubrir el total'); return null; }
  return {...base,received,change:roundMoney(received-totalInCurrency)};
}
function receiptPaymentHtml(record){
  const payment=record.payment;
  let html=`<div class="receipt-row"><span>Método de pago</span><span>${paymentMethodLabel(record.method)}</span></div>`;
  if(!payment) return html;
  const currency=payment.currency==='usd'?'usd':'nio';
  html+=`<div class="receipt-row"><span>Moneda</span><span>${currency==='usd'?'Dólar':'Córdoba'}</span></div>`;
  if(record.method==='mixto'){
    html+=(payment.mixedPayments||[]).map((part,index)=>`<div class="receipt-row"><span>Pago ${index+1} · ${paymentMethodLabel(part.method)}</span><span>${formatPaymentMoney(part.amount,currency)}</span></div>`).join('');
  }else{
    html+=`<div class="receipt-row"><span>Paga con</span><span>${formatPaymentMoney(payment.received,currency)}</span></div><div class="receipt-row"><span>Cambio</span><span>${formatPaymentMoney(payment.change,currency)}</span></div>`;
  }
  return html;
}
function escapeAttr(value){ return String(value ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function printableContactHtml(scope='clinic',format='ticket'){
  const settings = DB.settings||DEFAULT_SETTINGS;
  const data = scope==='cafe' ? {address:settings.address,phone:settings.phone} : settings;
  const rows = [
    ['Dirección',data.address],
    ...(data.email?[['Correo',data.email]]:[]),
    ...(data.ruc?[['RUC',data.ruc]]:[]),
    ['Teléfono convencional',data.phone],
  ];
  return `<div class="print-contact print-contact-${format}">${rows.map(([label,value])=>`<div><strong>${label}:</strong> ${escapeAttr(value)}</div>`).join('')}</div>`;
}
function printDocument(elementId){
  const node = document.getElementById(elementId);
  if(!node){ toast('No se encontró el documento para imprimir'); return; }
  const originalId = node.id;
  node.id='printArea';
  node.classList.add('print-letter');
  try{ window.print(); }
  finally{
    node.id=originalId;
    node.classList.remove('print-letter');
  }
}
function uid(prefix){ return prefix; }
function todayRange(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function fmtDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('es-NI',{day:'2-digit',month:'short'}) + ' · ' + d.toLocaleTimeString('es-NI',{hour:'2-digit',minute:'2-digit'});
}
function toast(msg){
  const t = el(`<div class="toast"><span class="ok-dot"></span>${msg}</div>`);
  document.getElementById('toastRoot').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='.25s'; setTimeout(()=>t.remove(),250); }, 2400);
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
function openModal(innerHtml, wide){
  document.getElementById('modalRoot').innerHTML =
    `<div class="modal-overlay" onclick="if(event.target===this) closeModal()">
       <div class="modal ${wide?'wide':''}">${innerHtml}</div>
     </div>`;
}

function render(){
  const app = document.getElementById('app');
  if(!S.user){ app.innerHTML = renderLogin(); return; }
  app.innerHTML = renderShell();
}

  return `

    <div class="login-card">

        <div>
          <div class="brand-mark">
            ${ICONS.tooth}
            <div>
              <div class="brand-name">${escapeAttr(businessName())}</div>
              <div class="brand-sub">Sistema de Facturación</div>
            </div>
          </div>
          <div class="login-quote">Cada sonrisa,<br>cada <span>ticket</span>,<br>bajo control.</div>
        </div>
        <div class="login-foot">Gestión integral de la clínica<br>Facturación dental + Cafetería</div>
      </div>
      <div class="login-main">
        <h1>Iniciar sesión</h1>
        <p class="desc">Selecciona tu usuario e ingresa tu contraseña para continuar.</p>
        <div class="role-list">
          ${DB.users.map(u=>{
            const isAdmin = isAdminUser(u);
            const iconClass = isAdmin?'adm':'caj';
            return `<button class="role-card" onclick="openLoginPassword(${u.id})">
              <div class="role-icon ${iconClass}">${isAdmin?ICONS.users:ICONS.pos}</div>
              <div>
                <div class="role-name">${escapeAttr(u.name)}</div>
                <div class="role-desc">${roleLabel(u.role)}</div>
              </div>
              <div class="role-arrow">${ICONS.chev.replace('chev','')}</div>
            </button>`;
          }).join('')}
        </div>
        <div class="login-note">Versión de prueba — sin backend. Los datos se guardan localmente en este navegador.</div>
      </div>
    </div>
  </div>`;
}
function openLoginPassword(userId){
  const user=DB.users.find(item=>item.id===userId);
  if(!user){ toast('No se encontró el usuario'); return; }
  openModal(`<div class="modal-head"><div class="modal-title">Iniciar sesión</div><button class="icon-btn" onclick="closeModal()" aria-label="Cerrar">${ICONS.x}</button></div><div class="modal-body"><div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;"><div class="sb-avatar">${initials(user.name)}</div><div><div style="font-weight:700;">${escapeAttr(user.name)}</div><div class="muted" style="font-size:12px;">${roleLabel(user.role)}</div></div></div><div class="field"><label>Contraseña</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="Escribe tu contraseña" onkeydown="handleLoginPasswordKey(event,${user.id})"></div><div id="loginPasswordError" role="alert" style="min-height:18px;color:var(--danger);font-size:12px;"></div></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="login(${user.id})">Ingresar</button></div>`);
  setTimeout(()=>document.getElementById('loginPassword')?.focus(),0);
}
function handleLoginPasswordKey(event,userId){ if(event.key==='Enter'){ event.preventDefault(); login(userId); } }
function login(userId){
  const user=DB.users.find(item=>item.id===userId);
  const password=document.getElementById('loginPassword')?.value||'';
  if(!user){ toast('No se encontró el usuario'); return; }
  if(password!==String(user.password||'')){
    const error=document.getElementById('loginPasswordError');
    if(error) error.textContent='Contraseña incorrecta. Intenta nuevamente.';
    document.getElementById('loginPassword')?.select();
    return;
  }
  S.user = user;
  S.section = roleHome(user);
  S.radiographySaleDate='';
  S.radiographySaleMethod='all';
  S.radiographySaleStatus='all';
  closeModal();
  render();
}
function logout(){ S.user=null; closeModal(); render(); }

function goSection(id){
  if(!canAccessSection(id)){ toast('No tienes acceso a este módulo.'); return; }
  S.section=id;
  render();
}

function renderSection(){
  if(!canAccessSection(S.section)){
    S.section=roleHome();
    return renderSection();
  }
  switch(S.section){
    case 'dashboard': return renderDashboard();
    case 'caja': return renderCaja();
    case 'citas': return renderCitas();
    case 'facturacion': return renderFacturacion();
    case 'pos': return renderPOS();
    case 'radiografias': return renderRadiografias();
    case 'pacientes': return renderPacientes();
    case 'servicios': return renderServicios();
    case 'usuarios': return renderUsuarios();
    case 'reportes': return renderReportes();
    default: return '';
  }
}

/* ================= CAJA ================= */
function currentCashSession(){ return DB.cashSessions.find(session=>session.status==='open')||null; }
function latestCashSession(){ return DB.cashSessions.slice().sort((a,b)=>b.openedAt-a.openedAt)[0]||null; }
function paymentBreakdown(record){
  const result={cash:0,card:0,transfer:0,total:roundMoney(record.total||record.price||0)};
  if(record.method!=='mixto'){
    if(record.method==='efectivo') result.cash=result.total;
    else if(record.method==='tarjeta') result.card=result.total;
    else if(record.method==='transferencia') result.transfer=result.total;
    return result;
  }
  const payment=record.payment||{};
  const parts=Array.isArray(payment.mixedPayments)?payment.mixedPayments:[];
  if(!parts.length) return result;
  const rate=Number(payment.exchangeRate)||currentExchangeRate();
  const converted=parts.map(part=>roundMoney((Number(part.amount)||0)*(payment.currency==='usd'?rate:1)));
  const allocated=roundMoney(converted.reduce((sum,amount)=>sum+amount,0));
  converted[converted.length-1]=roundMoney(converted[converted.length-1]+result.total-allocated);
  parts.forEach((part,index)=>{
    if(part.method==='efectivo') result.cash=roundMoney(result.cash+converted[index]);
    else if(part.method==='tarjeta') result.card=roundMoney(result.card+converted[index]);
    else if(part.method==='transferencia') result.transfer=roundMoney(result.transfer+converted[index]);
  });
  return result;
}
function cashSessionSummary(session,endDate){
  if(!session) return {initialFund:0,income:0,cash:0,card:0,transfer:0,expenses:0,cashExpenses:0,expectedCash:0,transactions:0};
  const end=Number(endDate||session.closedAt||Date.now());
  const invoices=DB.invoices.filter(invoice=>invoice.date>=session.openedAt && invoice.date<=end);
  const radiographies=DB.radiographies.filter(record=>record.paymentStatus==='pagado' && Number(record.paymentDate||record.date)>=session.openedAt && Number(record.paymentDate||record.date)<=end);
  const expenses=DB.expenses.filter(expense=>expense.date>=session.openedAt && expense.date<=end && (!expense.module||['clinic','dental','radiography','radiografias','rx'].includes(expense.module)));
  const transactions=[...invoices,...radiographies];
  const totals=transactions.reduce((sum,record)=>{
    const split=paymentBreakdown(record);
    sum.income=roundMoney(sum.income+split.total);
    sum.cash=roundMoney(sum.cash+split.cash);
    sum.card=roundMoney(sum.card+split.card);
    sum.transfer=roundMoney(sum.transfer+split.transfer);
    return sum;
  },{income:0,cash:0,card:0,transfer:0});
  const expenseTotal=roundMoney(expenses.reduce((sum,expense)=>sum+Number(expense.total||expense.amount||0),0));
  const cashExpenseTotal=roundMoney(expenses.reduce((sum,expense)=>sum+(paymentBreakdown({...expense,total:Number(expense.total||expense.amount||0)}).cash),0));
  const initialFund=roundMoney(session.initialFund);
  return {...totals,initialFund,expenses:expenseTotal,cashExpenses:cashExpenseTotal,expectedCash:roundMoney(initialFund+totals.cash-cashExpenseTotal),transactions:transactions.length};
}
function requireOpenCashRegister(){
  if(currentCashSession()) return true;
  toast('La caja está cerrada. Primero debes abrir la caja.');
  return false;
}
function renderCaja(){
  const openSession=currentCashSession();
  const session=openSession||latestCashSession();
  const summary=cashSessionSummary(session);
  const isOpen=!!openSession;
  const mainExpenses=DB.expenses.filter(isMainExpense).slice().sort((a,b)=>Number(b.date||0)-Number(a.date||0));
  return `<div class="card" style="margin-bottom:18px;">
    <div class="card-body cash-status">
      <div class="cash-status-main"><div class="cash-state ${isOpen?'open':'closed'}">${isOpen?'Caja abierta':'Caja cerrada'}</div><div class="muted" style="font-size:12px;margin-top:8px;">${session?(isOpen?`Abierta por ${escapeAttr(session.openedBy)} · ${new Date(session.openedAt).toLocaleString('es-NI')}`:`Último cierre: ${new Date(session.closedAt||session.openedAt).toLocaleString('es-NI')}`):'Aún no se ha registrado ninguna apertura.'}</div></div>
      ${canOperateClinic()?(isOpen?`<button class="btn btn-danger btn-outline" onclick="openCashClosingModal()">Cerrar caja</button>`:`<button class="btn btn-primary" onclick="openCashOpeningModal()">${ICONS.cash} Abrir caja</button>`):''}
    </div>
  </div>
  <div class="cash-kpis">
    <div class="kpi-card"><div class="kpi-label">Fondo inicial</div><div class="kpi-value">${fmt(summary.initialFund)}</div><div class="kpi-delta flat">Base de la jornada</div></div>

function openCashOpeningModal(){

}
function openCashRegister(){
  if(!requirePermission(canOperateClinic())) return;
  if(currentCashSession()){ toast('La caja ya está abierta'); return; }
  const initialFund=Number(document.getElementById('cashOpeningFund').value);
  const openingNote=document.getElementById('cashOpeningNote').value.trim();
  if(!Number.isFinite(initialFund)||initialFund<0){ toast('Escribe un fondo inicial válido'); return; }
  DB.cashSessions.unshift({id:`CJ-${String(DB.nextCashSessionNo++).padStart(4,'0')}`,status:'open',initialFund:roundMoney(initialFund),openingNote,openedBy:S.user.name,openedAt:Date.now()});
  saveDB();closeModal();render();toast('Caja abierta correctamente');
}
function cashDifferenceLabel(difference){
  if(difference>0.009) return {text:`Sobrante: ${fmt(difference)}`,className:'surplus'};
  if(difference<-0.009) return {text:`Faltante: ${fmt(Math.abs(difference))}`,className:'shortage'};
  return {text:'Sin diferencia',className:''};
}
function updateCashCloseDifference(value,expected){
  const counted=Number(value);
  const difference=Number.isFinite(counted)?roundMoney(counted-Number(expected||0)):0;
  const differenceNode=document.getElementById('cashCloseDifference');
  const resultNode=document.getElementById('cashCloseResult');
  if(differenceNode) differenceNode.textContent=fmt(difference);
  if(resultNode){ const result=cashDifferenceLabel(difference);resultNode.textContent=result.text;resultNode.className='cash-close-result '+result.className; }
}
function openCashClosingModal(){
  if(!requirePermission(canOperateClinic())) return;
  const session=currentCashSession();
  if(!session){ toast('La caja ya está cerrada'); return; }
  const summary=cashSessionSummary(session);
  openModal(`<div class="modal-head"><div class="modal-title">Cerrar caja</div><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div><div class="modal-body"><div class="receipt-row"><span>Fondo inicial</span><strong>${fmt(summary.initialFund)}</strong></div><div class="receipt-row"><span>Ingresos del día</span><strong>${fmt(summary.income)}</strong></div><div class="receipt-row"><span>Total recibido en efectivo</span><strong>${fmt(summary.cash)}</strong></div><div class="receipt-row"><span>Total recibido con tarjeta</span><strong>${fmt(summary.card)}</strong></div><div class="receipt-row"><span>Total recibido por transferencia</span><strong>${fmt(summary.transfer)}</strong></div><div class="receipt-row"><span>Gastos</span><strong>${fmt(summary.expenses)}</strong></div><div class="receipt-div"></div><div class="receipt-total"><span>Efectivo esperado en caja</span><span>${fmt(summary.expectedCash)}</span></div><div class="field" style="margin-top:16px;"><label>Efectivo contado físicamente</label><input id="cashClosingCounted" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" oninput="updateCashCloseDifference(this.value,${summary.expectedCash})"></div><div class="receipt-row"><span>Diferencia</span><strong id="cashCloseDifference">${fmt(0)}</strong></div><div id="cashCloseResult" class="cash-close-result">Sin diferencia</div><div class="field" style="margin-top:14px;"><label>Observación</label><textarea id="cashClosingNote" rows="3" placeholder="Observación del cierre"></textarea></div><div class="muted" style="font-size:11.5px;">Cierra: ${escapeAttr(S.user.name)} · ${new Date().toLocaleString('es-NI')}</div></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="closeCashRegister()">Confirmar cierre</button></div>`,true);
}
function closeCashRegister(){
  if(!requirePermission(canOperateClinic())) return;
  const session=currentCashSession();
  if(!session){ toast('La caja ya está cerrada'); return; }
  const countedCash=Number(document.getElementById('cashClosingCounted').value);
  const closingNote=document.getElementById('cashClosingNote').value.trim();
  if(!Number.isFinite(countedCash)||countedCash<0){ toast('Escribe el efectivo contado físicamente'); return; }
  const closedAt=Date.now();
  const summary=cashSessionSummary(session,closedAt);
  const difference=roundMoney(countedCash-summary.expectedCash);
  Object.assign(session,{status:'closed',closedAt,closedBy:S.user.name,closingNote,countedCash:roundMoney(countedCash),difference,closingResult:cashDifferenceLabel(difference).text,closingSummary:summary});
  saveDB();closeModal();render();toast('Caja cerrada correctamente');
}

function isCafeExpense(expense){ return ['cafe','cafeteria','cafetería'].includes(String(expense.module||'').toLocaleLowerCase('es')); }
function isMainExpense(expense){ return !isCafeExpense(expense) && (!expense.module||['clinic','dental','radiography','radiografias','rx'].includes(String(expense.module).toLocaleLowerCase('es'))); }
function expenseUser(expense){ return expense.user||expense.cashier||'—'; }
function movementTypeTag(type){
  const labels={invoice:'Factura',cardInvoice:'Factura solo tarjeta',expense:'Gasto',sale:'Venta'};
  const classes={invoice:'tag-completada',cardInvoice:'tag-tarjeta',expense:'tag-cancelada',sale:'tag-completada'};
  return `<span class="tag ${classes[type]||'tag-cajero'}">${labels[type]||type}</span>`;
}
function handleExpenseCardKey(event,scope){ if(event.key==='Enter'||event.key===' '){event.preventDefault();openExpenseModal(scope);} }
function openExpenseModal(scope='main'){
  const isCafe=scope==='cafe';
  if(!requirePermission(isCafe?canManageCafe():canOperateClinic())) return;
  if(!isCafe && !requireOpenCashRegister()) return;
  openModal(`<div class="modal-head"><div class="modal-title">Registrar gasto ${isCafe?'de Cafetería':'de la clínica'}</div><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div><div class="modal-body"><div class="field"><label>Concepto o descripción</label><input id="expenseConcept" placeholder="Ej. Compra de insumos"></div><div class="field-row"><div class="field"><label>Monto</label><input id="expenseAmount" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="0.00"></div><div class="field"><label>Método de pago</label><select id="expenseMethod"><option value="efectivo">Efectivo</option><option value="tarjeta">Tarjeta</option><option value="transferencia">Transferencia</option></select></div></div><div class="field"><label>Observación (opcional)</label><textarea id="expenseNotes" rows="3" placeholder="Detalle adicional"></textarea></div><div class="muted" style="font-size:11.5px;">Se registrarán automáticamente el usuario, la fecha y la hora.</div></div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveExpense('${isCafe?'cafe':'main'}')">Registrar gasto</button></div>`);
}
function saveExpense(scope='main'){
  const isCafe=scope==='cafe';
  if(!requirePermission(isCafe?canManageCafe():canOperateClinic())) return;
  if(!isCafe && !requireOpenCashRegister()) return;
  const concept=document.getElementById('expenseConcept').value.trim();
  const amount=Number(document.getElementById('expenseAmount').value);
  const method=document.getElementById('expenseMethod').value;
  const notes=document.getElementById('expenseNotes').value.trim();
  if(!concept){toast('Escribe el concepto del gasto');return;}
  if(!Number.isFinite(amount)||amount<=0){toast('Escribe un monto válido');return;}
  if(!['efectivo','tarjeta','transferencia'].includes(method)){toast('Selecciona un método de pago válido');return;}
  DB.expenses.unshift({id:`G-${String(DB.nextExpenseNo++).padStart(4,'0')}`,module:isCafe?'cafe':'clinic',concept,amount:roundMoney(amount),total:roundMoney(amount),method,notes,user:S.user.name,cashier:S.user.name,date:Date.now()});
  saveDB();closeModal();render();toast('Gasto registrado correctamente');
}
function viewExpense(id){
  const expense=DB.expenses.find(item=>item.id===id);
  if(!expense){toast('No se encontró el gasto');return;}
  if(!requirePermission(isCafeExpense(expense)?canManageCafe():canOperateClinic())) return;
  openModal(`<div class="modal-head"><div class="modal-title">Gasto ${escapeAttr(expense.id)}</div><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div><div class="modal-body"><div class="receipt-row"><span>Economía</span><strong>${isCafeExpense(expense)?'Cafetería':'Clínica + Radiografías'}</strong></div><div class="receipt-row"><span>Fecha y hora</span><strong>${new Date(expense.date).toLocaleString('es-NI')}</strong></div><div class="receipt-row"><span>Concepto</span><strong>${escapeAttr(expense.concept||'Gasto')}</strong></div><div class="receipt-row"><span>Método</span><strong>${paymentMethodLabel(expense.method)}</strong></div><div class="receipt-row"><span>Usuario</span><strong>${escapeAttr(expenseUser(expense))}</strong></div><div class="receipt-div"></div><div class="receipt-total"><span>Monto</span><span>${fmt(expense.total||expense.amount)}</span></div>${expense.notes?`<div class="receipt-div"></div><div><span class="muted">Observación</span><div style="margin-top:5px;">${escapeAttr(expense.notes)}</div></div>`:''}</div><div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Cerrar</button></div>`);
}

function cafeTodaySummary(){
  const start=todayRange();
  const sales=DB.posSales.filter(sale=>sale.date>=start);
  const expenses=DB.expenses.filter(expense=>expense.date>=start && ['cafe','cafeteria','cafetería'].includes(String(expense.module||'').toLocaleLowerCase('es')));
  const totals=sales.reduce((sum,sale)=>{
    const split=paymentBreakdown(sale);
    sum.income=roundMoney(sum.income+split.total);
    sum.cash=roundMoney(sum.cash+split.cash);
    sum.card=roundMoney(sum.card+split.card);
    sum.transfer=roundMoney(sum.transfer+split.transfer);
    return sum;
  },{income:0,cash:0,card:0,transfer:0});
  const expenseTotal=roundMoney(expenses.reduce((sum,expense)=>sum+Number(expense.total||expense.amount||0),0));
  const cashExpenseTotal=roundMoney(expenses.reduce((sum,expense)=>sum+paymentBreakdown({...expense,total:Number(expense.total||expense.amount||0)}).cash,0));
  return {...totals,expenses:expenseTotal,cashExpenses:cashExpenseTotal,cashInRegister:roundMoney(totals.cash-cashExpenseTotal),transactions:sales.length};
}

function saveProduct(editId){
  if(!requirePermission(canManageCafe())) return;
  const name = document.getElementById('prName').value.trim();
  const cat = document.getElementById('prCat').value;
  const price = parseFloat(document.getElementById('prPrice').value);
  const iconType = document.getElementById('prIcon').value;
  const available = document.getElementById('prState').value==='available';
  if(!name){ toast('Escribe el nombre del producto'); return; }
  if(!PRODUCT_CATEGORIES.includes(cat)){ toast('Selecciona una categoría válida'); return; }
  if(isNaN(price) || price<0){ toast('Escribe un precio válido'); return; }
  const duplicate = DB.products.find(p=>p.name.toLowerCase()===name.toLowerCase() && p.id!==editId);
  if(duplicate){ toast('Ya existe un producto con ese nombre'); return; }
  if(editId){
    const product = DB.products.find(p=>p.id===editId);
    if(!product){ toast('No se encontró el producto'); return; }
    const previousName = product.name;
    Object.assign(product,{name,cat,price,iconType,available});
    S.posCart.forEach(line=>{
      if(line.productId===editId || (!line.productId && line.name===previousName)) Object.assign(line,{productId:editId,name,price});
    });
    if(!available) S.posCart = S.posCart.filter(line=>line.productId!==editId);
  }else{
    DB.products.push({id:DB.nextProductId++,name,cat,price,iconType,available});
  }
  resetPaymentDraft('pos');
  saveDB(); closeModal(); render();
  toast(editId?'Producto actualizado':'Producto creado');
}
function deleteProduct(id){
  if(!requirePermission(canManageCafe())) return;
  const product = DB.products.find(p=>p.id===id);
  if(!product) return;
  if(!confirm(`¿Eliminar el producto "${product.name}"?`)) return;
  DB.products = DB.products.filter(p=>p.id!==id);
  S.posCart = S.posCart.filter(line=>line.productId!==id && line.name!==product.name);
  resetPaymentDraft('pos');

}

B//Z" alt="Smart Radiography">
  </div>

  <div class="filter-bar">
    <button class="chip sel" onclick="document.getElementById('rxStudies').scrollIntoView({behavior:'smooth'})">${ICONS.xray} Estudios y ventas</button>
    <button class="chip" onclick="document.getElementById('rxReports').scrollIntoView({behavior:'smooth'})">${ICONS.reports} Reportes de Radiografías</button>
  </div>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">${ICONS.cash} Ingresos de hoy</div>
      <div class="kpi-value">${fmtRadiographyMoney(incomeToday)}</div>
      <div class="kpi-delta flat">Solo estudios pagados</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">${ICONS.invoice} Total facturado en Radiografías</div>
      <div class="kpi-value">${fmtRadiographyMoney(totalBilled)}</div>
      <div class="kpi-delta flat">Pagado y pendiente</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">${ICONS.xray} Estudios vendidos</div>
      <div class="kpi-value">${billed.length}</div>
      <div class="kpi-delta flat">Recibos no anulados</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">${ICONS.calendar} Pendiente por cobrar</div>
      <div class="kpi-value">${fmtRadiographyMoney(pending)}</div>
      <div class="kpi-delta flat">${list.filter(r=>r.paymentStatus==='pendiente').length} recibos pendientes</div>
    </div>
  </div>

  <div class="card" id="rxStudies">
    <div class="card-head">
      <div class="card-title">${ICONS.xray} Estudios radiográficos recientes</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="muted" style="font-size:12px;">${list.length} registros</span>
        <button class="btn btn-primary btn-sm" onclick="openAddRadiography()">${ICONS.plus} Nuevo estudio</button>
      </div>
    </div>
    ${list.length ? `<table><thead><tr><th>Código</th><th>Fecha</th><th>Paciente</th><th>Estudio</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>
      ${list.map(r=>`<tr>
        <td class="mono">${r.id}</td>
        <td class="muted">${fmtDate(r.date)}</td>
        <td style="font-weight:600;">${r.patient}</td>
        <td>${r.study}</td>
        <td class="mono" style="font-weight:700;">${fmtRadiographyMoney(r.price)}</td>
        <td>${radiographyStatusTag(r.status)}</td>
        <td style="display:flex;gap:6px;">
          <button class="btn btn-ghost btn-sm" onclick="viewRadiographyReceipt(${r.key})">${ICONS.eye} Ver recibo</button>
          <button class="btn btn-ghost btn-sm" onclick="openEditRadiography(${r.key})">${ICONS.pencil} Editar</button>
          <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteRadiography(${r.key})">${ICONS.trash}</button>
        </td>
      </tr>`).join('')}
    </tbody></table>` : emptyState('Sin radiografías','No hay estudios registrados')}
  </div>

  <div class="card" style="margin-top:18px;">
    <div class="card-head">
      <div class="card-title">${ICONS.invoice} Historial de ventas de Radiografías</div>
      <span class="muted" style="font-size:12px;">${sales.length} registros</span>
    </div>
    <div class="card-body" style="padding-bottom:8px;">
      <div class="filter-bar">
        <div class="field" style="margin:0;min-width:160px;"><label>Fecha</label><input type="date" value="${S.radiographySaleDate}" onchange="S.radiographySaleDate=this.value;render();"></div>
        <div class="field" style="margin:0;min-width:160px;"><label>Método de pago</label><select onchange="S.radiographySaleMethod=this.value;render();">

function renderRadiographyReports(list){
  const paid = list.filter(r=>r.paymentStatus==='pagado');
  const sold = list.filter(r=>r.paymentStatus!=='anulado');
  const today = todayRange();
  const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
  const dailyIncome = paid.filter(r=>r.date>=today).reduce((sum,r)=>sum+r.price,0);
  const monthlyIncome = paid.filter(r=>r.date>=monthStart.getTime()).reduce((sum,r)=>sum+r.price,0);
  const pending = list.filter(r=>r.paymentStatus==='pendiente').reduce((sum,r)=>sum+r.price,0);
  const studyCounts = {};
  sold.forEach(r=>{ studyCounts[r.study]=(studyCounts[r.study]||0)+1; });
  const studies = Object.entries(studyCounts).sort((a,b)=>b[1]-a[1]);
  const maxStudy = Math.max(1,...studies.map(([,count])=>count));
  const methodLabels = {efectivo:'Efectivo',tarjeta:'Tarjeta',transferencia:'Transferencia',mixto:'Mixto'};
  const methodTotals = Object.keys(methodLabels).map(method=>[methodLabels[method],paid.filter(r=>r.method===method).reduce((sum,r)=>sum+r.price,0)]);
  const maxMethod = Math.max(1,...methodTotals.map(([,total])=>total));
  return `
  <div id="rxReports" style="scroll-margin-top:20px;margin-top:22px;">
    <div class="section-head">
      <div><h2>Reportes de Radiografías</h2><p>Información económica exclusiva de Smart Radiography</p></div>
      <button class="btn btn-outline btn-sm no-print" onclick="printDocument('rxReports')">${ICONS.print} Imprimir reporte</button>
    </div>
    ${printableContactHtml('clinic','letter')}
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">${ICONS.cash} Ingresos diarios</div><div class="kpi-value">${fmtRadiographyMoney(dailyIncome)}</div><div class="kpi-delta flat">Estudios pagados hoy</div></div>
      <div class="kpi-card"><div class="kpi-label">${ICONS.calendar} Ingresos mensuales</div><div class="kpi-value">${fmtRadiographyMoney(monthlyIncome)}</div><div class="kpi-delta flat">Mes calendario actual</div></div>
      <div class="kpi-card"><div class="kpi-label">${ICONS.invoice} Pendiente por cobrar</div><div class="kpi-value">${fmtRadiographyMoney(pending)}</div><div class="kpi-delta flat">Solo Radiografías</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-head"><div class="card-title">Estudios más vendidos</div></div>
        <div class="card-body">
          ${studies.map(([name,count])=>`<div class="bar-row"><div class="bar-label" style="width:175px;">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${count/maxStudy*100}%;background:var(--teal)"></div></div><div class="bar-val">${count}</div></div>`).join('') || emptyState('Sin datos','No hay estudios vendidos')}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">Ventas por método de pago</div></div>
        <div class="card-body">
          ${methodTotals.map(([name,total])=>`<div class="bar-row"><div class="bar-label" style="width:125px;">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${total/maxMethod*100}%;background:var(--amber)"></div></div><div class="bar-val">${fmtRadiographyMoney(total)}</div></div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

  const labels = {lista:'Lista',revision:'En revisión',archivada:'Archivada'};
  const classes = {lista:'tag-completada',revision:'tag-confirmada',archivada:'tag-cajero'};
  return `<span class="tag ${classes[status]||'tag-cajero'}">${labels[status]||status}</span>`;

function suggestRadiographyPrice(serviceId){
  const service = DB.services.find(item=>Number(item.id)===Number(serviceId) && item.type==='radiografia');
  const input = document.getElementById('rxPrice');
  const price = Number(service && Number.isFinite(Number(service.price))?service.price:0);
  if(input) input.value = price.toFixed(2);
  const note = document.getElementById('rxCatalogPrice');
  if(note) note.textContent = `Precio definido en el catálogo: ${fmtRadiographyMoney(price)}`;
  const draft=paymentDraft('rx');
  draft.received=''; draft.mixed1Amount=''; draft.mixed2Amount='';
  refreshChargeBlock('rx',price,S.rxMethod);
}
function saveRadiography(editKey){
  if(!requirePermission(canManageRadiographies())) return;
  const id = document.getElementById('rxCode').value.trim();
  const patient = document.getElementById('rxPatient').value.trim();
  const dateVal = document.getElementById('rxDate').value;
  const timeVal = document.getElementById('rxTime').value;
  const serviceId = Number(document.getElementById('rxStudy').value);
  const service = DB.services.find(item=>Number(item.id)===serviceId && item.type==='radiografia');
  const study = service ? service.name : '';
  const status = document.getElementById('rxStatus').value;
  const price = service && Number.isFinite(Number(service.price)) ? Number(service.price) : 0;
  const method = S.rxMethod||document.getElementById('rxMethod').value;
  const paymentStatus = document.getElementById('rxPaymentStatus').value;
  const notes = document.getElementById('rxNotes').value.trim();
  if(!service){ toast('Selecciona un tipo de radiografía disponible'); return; }
  if(!id || !patient || !dateVal || !timeVal || !study || !method || !paymentStatus){ toast('Completa todos los campos obligatorios'); return; }
  const duplicate = DB.radiographies.find(r=>r.id.toLowerCase()===id.toLowerCase() && r.key!==editKey);
  if(duplicate){ toast('Ya existe un estudio con ese código'); return; }
  const date = new Date(dateVal+'T'+timeVal).getTime();
  if(isNaN(date)){ toast('Selecciona una fecha y hora válidas'); return; }
  const payment=buildPaymentRecord('rx',price,method,paymentStatus==='pagado');
  if(!payment) return;
  if(editKey){
    const record = DB.radiographies.find(r=>r.key===editKey);
    if(!record){ toast('No se encontró el estudio'); return; }
    const paymentDate=paymentStatus==='pagado' ? (record.paymentStatus==='pagado'?Number(record.paymentDate||record.date||Date.now()):Date.now()) : null;
    Object.assign(record,{id,date,patient,serviceId,study,status,price,method,payment,paymentStatus,paymentDate,notes});
  }else{
    const receiptNo = `RX-T-${String(DB.nextRadiographyReceiptNo).padStart(4,'0')}`;
    DB.radiographies.push({key:Date.now(),id,receiptNo,serviceId,date,patient,study,status,price,method,payment,paymentStatus,paymentDate:paymentStatus==='pagado'?Date.now():null,cashier:S.user.name,notes});
    DB.nextRadiographyNo++;
    DB.nextRadiographyReceiptNo++;
  }
  saveDB(); closeModal(); render();
  toast(editKey?'Estudio actualizado':'Estudio creado');
}

function dayKey(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function toDateInputVal(ts){ const d=new Date(ts); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function toTimeInputVal(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('es-NI',{hour:'2-digit',minute:'2-digit'}); }
const WEEKDAY_SHORT = ['dom','lun','mar','mié','jue','vie','sáb'];

function renderCitas(){
  const selDay = S.agendaDate;
  const stripDays = [];
  for(let i=-3;i<=3;i++){
    const d = new Date(selDay); d.setDate(d.getDate()+i); d.setHours(0,0,0,0);
    const ts = d.getTime();
    const count = DB.appointments.filter(a=>dayKey(a.date)===ts && a.status!=='cancelada').length;
    stripDays.push({ts, d, count});
  }
  const dayAppts = DB.appointments.filter(a=>dayKey(a.date)===selDay).sort((a,b)=>a.date-b.date);
  const dateTitle = new Date(selDay).toLocaleDateString('es-NI',{weekday:'long', day:'2-digit', month:'long'});

  return `
  <div class="day-strip">
    ${stripDays.map(x=>`
      <button class="day-chip ${x.ts===selDay?'sel':''}" onclick="setAgendaDate(${x.ts})">
        <span class="dname">${WEEKDAY_SHORT[x.d.getDay()]}</span>
        <span class="dnum">${x.d.getDate()}</span>
        <span class="dcount">${x.count?x.count+' cita'+(x.count>1?'s':''):'—'}</span>
      </button>`).join('')}
  </div>

  <div class="agenda-nav">
    <button class="icon-btn btn-outline" style="border:1.5px solid var(--border);" onclick="changeAgendaDate(-1)">${ICONS.arrowLeft}</button>

    <button class="btn btn-ghost btn-sm" onclick="setAgendaDate(${(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();})()})">Hoy</button>
    <button class="icon-btn btn-outline" style="border:1.5px solid var(--border);" onclick="changeAgendaDate(1)">${ICONS.arrowRight}</button>
    <span class="sb-spacer"></span>
    <button class="btn btn-primary" onclick="openAddCita()">${ICONS.plus} Nueva cita</button>
  </div>

  <div class="card">
    <div class="card-body">
      ${dayAppts.length ? dayAppts.map(a=>`
        <div class="appt-row">
          <div class="appt-time">${fmtTime(a.date)}</div>
          <div class="appt-main">
            <div class="appt-patient">${a.patient}</div>
            <div class="appt-meta">${a.service} · ${a.dentist}${a.notes?' · '+a.notes:''}</div>

          <span class="tag tag-${a.status}">${statusLabel(a.status)}</span>
          <div class="appt-actions">
            ${a.status==='pendiente'?`<button class="btn btn-ghost btn-sm" onclick="setApptStatus('${a.id}','confirmada')">${ICONS.check} Confirmar</button>`:''}
            ${a.status==='confirmada'?`<button class="btn btn-ghost btn-sm" onclick="setApptStatus('${a.id}','completada')">${ICONS.check} Completar</button>`:''}

            ${a.status==='completada'?`<button class="btn btn-ghost btn-sm" onclick="facturarFromCita('${a.id}')">${ICONS.invoice} Facturar</button>`:''}
            <button class="icon-btn btn-danger" style="width:28px;height:28px;" onclick="deleteAppt('${a.id}')">${ICONS.trash}</button>
          </div>
        </div>
      `).join('') : emptyState('Sin citas para este día','Usa "Nueva cita" para agendar un paciente')}
    </div>
  </div>
  `;
}

let patientSearchIndex = null;
function normalizePatientSearch(value){
  return String(value??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}
function invalidatePatientSearchIndex(){ patientSearchIndex=null; }
function getPatientSearchIndex(){
  if(patientSearchIndex) return patientSearchIndex;
  patientSearchIndex = DB.patients.map(patient=>{
    const fields = [patient.name,patient.phone,patient.expediente,patient.recordNo,patient.fileNo,patient.code,patient.codigo,patient.id];
    const searchable = normalizePatientSearch(fields.filter(value=>value!==undefined && value!==null).join(' '));
    return {patient,searchable,compact:searchable.replace(/[^a-z0-9]/g,'')};
  }).sort((a,b)=>a.patient.name.localeCompare(b.patient.name));
  return patientSearchIndex;
}
function searchPatients(query){
  const normalized = normalizePatientSearch(query);
  if(!normalized) return getPatientSearchIndex().map(entry=>entry.patient);
  const terms = normalized.split(/\s+/).filter(Boolean);
  return getPatientSearchIndex().filter(entry=>terms.every(term=>{
    const compactTerm = term.replace(/[^a-z0-9]/g,'');
    return entry.searchable.includes(term) || (compactTerm && entry.compact.includes(compactTerm));
  })).map(entry=>entry.patient);
}
function renderPacientes(){
  if(S.patientDetailId) return renderPatientHistory(S.patientDetailId);
  return renderPatientDirectory();
}

  const list = searchPatients(S.patientSearch);

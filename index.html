function savePatient(editId){
  if(!requirePermission(editId?isAdminUser():canOperateClinic(),editId?'Solo el Administrador general puede editar pacientes.':'No tienes permiso para registrar pacientes.')) return;
  const name = document.getElementById('npName').value.trim();
  const phone = document.getElementById('npPhone').value.trim();
  const profile = {birthDate:document.getElementById('npBirth').value,sex:document.getElementById('npSex').value,address:document.getElementById('npAddress').value.trim(),emergencyContact:document.getElementById('npEmergency').value.trim(),allergies:document.getElementById('npAllergies').value.trim(),medicalHistory:document.getElementById('npMedical').value.trim(),currentMedications:document.getElementById('npMedications').value.trim(),diagnoses:document.getElementById('npDiagnoses').value.trim(),completedTreatments:document.getElementById('npCompleted').value.trim(),pendingTreatments:document.getElementById('npPending').value.trim(),generalNotes:document.getElementById('npNotes').value.trim()};
  if(!name){ toast('Escribe un nombre'); return; }
  const duplicate = DB.patients.find(p=>p.name.toLowerCase()===name.toLowerCase() && p.id!==editId);
  if(duplicate){ toast('Ya existe un paciente con ese nombre'); return; }
  if(editId){
    const patient = DB.patients.find(p=>p.id===editId);
    if(!patient){ toast('No se encontró el paciente'); return; }
    const previousName = patient.name;
    Object.assign(patient,{name,phone,...profile});
    DB.invoices.forEach(item=>{ if(item.patient===previousName) item.patient=name; });
    DB.appointments.forEach(item=>{ if(item.patient===previousName) item.patient=name; });
    DB.radiographies.forEach(item=>{ if(item.patient===previousName) item.patient=name; });
    if(S.invoicePatient===previousName) S.invoicePatient=name;
  }else{
    DB.patients.push(normalizePatientProfile({id:Date.now(),name,phone,...profile}));
  }
  invalidatePatientSearchIndex();
  saveDB(); closeModal(); render();
  toast(editId?'Paciente actualizado':'Paciente agregado');
}
function deletePatient(id){
  if(!requireAdmin()) return;
  const patient = DB.patients.find(p=>p.id===id);
  if(!patient) return;
  if(!confirm(`¿Eliminar a "${patient.name}" y su historial clínico?`)) return;
  DB.patients = DB.patients.filter(p=>p.id!==id);
  DB.clinicalEntries = DB.clinicalEntries.filter(entry=>entry.patientId!==id);
  invalidatePatientSearchIndex();
  if(S.patientDetailId===id) S.patientDetailId=null;
  saveDB(); render(); toast('Paciente eliminado');
}

  const type = document.getElementById('svType').value;
  if(!name){ toast('Escribe el nombre del servicio'); return; }
  if(isNaN(price) || price<0){ toast('Escribe un precio válido'); return; }
  if(!['dental','radiografia'].includes(type)){ toast('Selecciona un tipo de servicio válido'); return; }
  const duplicate = DB.services.find(service=>service.name.toLowerCase()===name.toLowerCase() && service.id!==editId);
  if(duplicate){ toast('Ya existe un servicio con ese nombre'); return; }
  if(editId){
    const s = DB.services.find(x=>x.id===editId);
    if(!s){ toast('No se encontró el servicio'); return; }
    const previousName = s.name;
    const usedStudies = DB.radiographies.filter(record=>Number(record.serviceId)===Number(s.id) || record.study===previousName);
    if(s.type==='radiografia' && type!=='radiografia' && usedStudies.length && !confirm(`Este tipo de radiografía está siendo utilizado por ${usedStudies.length} estudio(s). Si cambia a Servicio dental, dejará de estar disponible para nuevos estudios. ¿Desea continuar?`)) return;
    s.name = name; s.price = price; s.type = type;
    if(type==='radiografia'){
      usedStudies.forEach(record=>Object.assign(record,{serviceId:s.id,study:name,price}));
    }
    toast('Servicio actualizado');
  }else{
    DB.services.push({id:DB.nextServiceId++, name, price, type});
    toast('Servicio creado');
  }
  saveDB(); closeModal(); render();
}
function deleteServicio(id){
  if(!requireAdmin()) return;
  const service = DB.services.find(item=>item.id===id);
  if(!service){ toast('No se encontró el servicio'); return; }
  if(service.type==='radiografia'){
    const used = DB.radiographies.filter(record=>Number(record.serviceId)===Number(service.id) || record.study===service.name).length;
    if(used && !confirm(`Este tipo de radiografía está siendo utilizado por ${used} estudio(s). Los estudios conservarán sus datos históricos, pero el tipo dejará de estar disponible para nuevos registros. ¿Desea eliminarlo?`)) return;
  }
  DB.services = DB.services.filter(item=>item.id!==id);
  saveDB(); render();
  toast('Servicio eliminado');
}

/* ================= USUARIOS ================= */
function renderUsuarios(){
  if(!isAdminUser()) return emptyState('Acceso restringido','Solo el Administrador general puede administrar usuarios y configuración.');
  const list = DB.users;
  const settings=currentSettings();
  return `
  <div class="card">
    <div class="card-head">
      <div class="card-title">${ICONS.users} Usuarios del sistema</div>
      <button class="btn btn-primary btn-sm" onclick="openAddUser()">${ICONS.plus} Nuevo usuario</button>
    </div>
    <table><thead><tr><th>Nombre</th><th>Rol</th><th>Usuario</th><th></th></tr></thead><tbody>
      ${list.map(u=>`<tr>
        <td style="font-weight:600;">${escapeAttr(u.name)}</td>
        <td><span class="tag ${isAdminUser(u)?'tag-admin':'tag-cajero'}">${roleLabel(u.role)}</span></td>
        <td class="mono muted">${escapeAttr(u.username)}</td>
        <td style="display:flex;gap:6px;">
          <button class="btn btn-ghost btn-sm" onclick="openEditUser(${u.id})">${ICONS.pencil} Editar</button>
          ${!isAdminUser(u)&&u.id!==S.user.id?`<button class="btn btn-ghost btn-sm btn-danger" onclick="deleteUser(${u.id})">${ICONS.trash}</button>`:'<span class="muted" style="font-size:11.5px;align-self:center;">—</span>'}
        </td>
      </tr>`).join('')}
    </tbody></table>
  </div>
  <div class="card" style="margin-top:18px;">
    <div class="card-head"><div class="card-title">${ICONS.reports} Configuración del sistema</div><span class="muted" style="font-size:12px;">Datos generales y moneda</span></div>
    <div class="card-body">
      <div class="field-row">
        <div class="field"><label>Nombre del negocio</label><input id="cfgBusinessName" value="${escapeAttr(settings.businessName)}" placeholder="Nombre de la clínica"></div>
        <div class="field"><label>Teléfono convencional</label><input id="cfgPhone" value="${escapeAttr(settings.phone)}" placeholder="Número de teléfono"></div>
      </div>
      <div class="field"><label>Dirección</label><textarea id="cfgAddress" rows="2" placeholder="Dirección completa">${escapeAttr(settings.address)}</textarea></div>
      <div class="field-row">
        <div class="field"><label>Correo electrónico</label><input id="cfgEmail" type="email" value="${escapeAttr(settings.email)}" placeholder="correo@clinica.com"></div>
        <div class="field"><label>RUC</label><input id="cfgRuc" value="${escapeAttr(settings.ruc)}" placeholder="Número RUC"></div>
      </div>
      <div class="field" style="max-width:360px;"><label>Tipo de cambio dólar → córdoba</label><input id="cfgExchangeRate" type="number" min="0.01" step="0.01" inputmode="decimal" value="${Number(settings.exchangeRate).toFixed(2)}"><div class="muted" style="font-size:11px;margin-top:6px;">Valor de C$ correspondiente a US$ 1.00.</div></div>
      <div class="field"><label>Mensaje al pie de la factura</label><textarea id="cfgInvoiceFooter" rows="2" placeholder="Mensaje opcional">${escapeAttr(settings.invoiceFooter||'')}</textarea><div class="muted" style="font-size:11px;margin-top:6px;">Se usará en facturas y recibos. Déjalo vacío para no mostrar ningún mensaje.</div></div>
      <div style="display:flex;justify-content:flex-end;"><button class="btn btn-primary" onclick="saveSystemSettings()">Guardar configuración</button></div>
    </div>
  </div>`;
}
function openAddUser(){
  if(!requireAdmin()) return;
  openUserForm();
}
function openEditUser(id){
  if(!requireAdmin()) return;
  openUserForm(id);
}
function openUserForm(editId){
  if(!requireAdmin()) return;
  const user = editId ? DB.users.find(u=>u.id===editId) : null;
  if(editId && !user){ toast('No se encontró el usuario'); return; }
  const role = user ? normalizeUserRole(user.role,user) : 'cajero_clinica';
  const existingAdmin=DB.users.find(item=>isAdminUser(item));
  const adminUnavailable=!!existingAdmin&&(!user||existingAdmin.id!==user.id);
  openModal(`
    <div class="modal-head"><div class="modal-title">${user?'Editar usuario':'Nuevo usuario'}</div><button class="icon-btn" onclick="closeModal()">${ICONS.x}</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre completo</label><input id="nuName" placeholder="Ej. Pedro Sánchez" value="${escapeAttr(user?user.name:'')}"></div>
      <div class="field"><label>Usuario</label><input id="nuUser" placeholder="pedro.sanchez" value="${escapeAttr(user?user.username:'')}"></div>
      <div class="field"><label>Rol</label>
        <select id="nuRole" ${user&&isAdminUser(user)?'disabled':''}>
          <option value="cajero_clinica" ${role==='cajero_clinica'?'selected':''}>Cajero clínica</option>
          <option value="cajero_cafeteria" ${role==='cajero_cafeteria'?'selected':''}>Cajero cafetería</option>
          <option value="cajero_radiografias" ${role==='cajero_radiografias'?'selected':''}>Cajero radiografías</option>
          <option value="admin_general" ${role==='admin_general'?'selected':''} ${adminUnavailable?'disabled':''}>Administrador general${adminUnavailable?' (no disponible)':''}</option>
        </select>
        ${user&&isAdminUser(user)?'<div class="muted" style="font-size:11.5px;margin-top:6px;">Debe conservarse el único Administrador general del sistema.</div>':''}
      </div>
      ${user?`<button id="toggleUserPassword" type="button" class="btn btn-outline btn-sm" onclick="toggleUserPasswordFields()">Cambiar o restablecer contraseña</button>`:''}
      <div id="nuPasswordFields" style="display:${user?'none':'block'};margin-top:14px;">
        <div class="field-row"><div class="field"><label>${user?'Nueva contraseña':'Contraseña'}</label><input id="nuPassword" type="password" autocomplete="new-password" placeholder="Mínimo 4 caracteres"></div><div class="field"><label>Confirmar contraseña</label><input id="nuPasswordConfirm" type="password" autocomplete="new-password" placeholder="Repite la contraseña"></div></div>
        <div class="muted" style="font-size:11.5px;">La contraseña permanecerá oculta y no se mostrará en la lista de usuarios.</div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveUser(${user?user.id:'null'})">${user?'Guardar cambios':'Guardar usuario'}</button></div>
  `);
}
function toggleUserPasswordFields(){
  const fields=document.getElementById('nuPasswordFields');
  const button=document.getElementById('toggleUserPassword');
  if(!fields) return;
  const show=fields.style.display==='none';
  fields.style.display=show?'block':'none';
  if(button) button.textContent=show?'Cancelar cambio de contraseña':'Cambiar o restablecer contraseña';
  if(!show){ document.getElementById('nuPassword').value=''; document.getElementById('nuPasswordConfirm').value=''; }
  else document.getElementById('nuPassword')?.focus();
}
function saveUser(editId){
  if(!requireAdmin()) return;
  const name = document.getElementById('nuName').value.trim();
  const username = document.getElementById('nuUser').value.trim();
  const role = document.getElementById('nuRole').value;
  const passwordFields=document.getElementById('nuPasswordFields');
  const changingPassword=!editId||!!passwordFields&&passwordFields.style.display!=='none';
  const password=document.getElementById('nuPassword')?.value||'';
  const passwordConfirm=document.getElementById('nuPasswordConfirm')?.value||'';
  if(!name || !username){ toast('Completa todos los campos'); return; }
  if(!ROLE_CONFIG[role]){ toast('Selecciona un rol válido'); return; }
  const duplicate = DB.users.find(u=>u.username.toLowerCase()===username.toLowerCase() && u.id!==editId);
  if(duplicate){ toast('Ese nombre de usuario ya existe'); return; }
  const existingAdmin=DB.users.find(user=>isAdminUser(user));
  if(role==='admin_general'&&existingAdmin&&existingAdmin.id!==editId){ toast('Solo puede existir un Administrador general.'); return; }
  if(changingPassword){
    if(password.length<4){ toast('La contraseña debe tener al menos 4 caracteres'); return; }
    if(password!==passwordConfirm){ toast('Las contraseñas no coinciden'); return; }
  }
  if(editId){
    const user = DB.users.find(u=>u.id===editId);
    if(!user){ toast('No se encontró el usuario'); return; }
    if(isAdminUser(user)&&role!=='admin_general'){ toast('Debe existir un Administrador general.'); return; }
    Object.assign(user,{name,role,username,...(changingPassword?{password}:{})});
    if(S.user.id===user.id) S.user=user;
  }else{
    DB.users.push({id:Date.now(), name, role, username, password});
  }
  saveDB(); closeModal(); render();
  toast(editId?'Usuario actualizado':'Usuario creado');
}
function deleteUser(id){
  if(!requireAdmin()) return;
  const user=DB.users.find(item=>item.id===id);
  if(!user){ toast('No se encontró el usuario'); return; }
  if(isAdminUser(user)){ toast('No se puede eliminar al Administrador general.'); return; }
  if(S.user.id===id){ toast('No puedes eliminar tu propia sesión.'); return; }
  if(!confirm(`¿Eliminar al usuario "${user.name}"?`)) return;
  DB.users = DB.users.filter(item=>item.id!==id);
  saveDB(); render(); toast('Usuario eliminado');
}
function saveSystemSettings(){
  if(!requireAdmin()) return;
  const businessName=document.getElementById('cfgBusinessName').value.trim();
  const address=document.getElementById('cfgAddress').value.trim();
  const email=document.getElementById('cfgEmail').value.trim();
  const phone=document.getElementById('cfgPhone').value.trim();
  const ruc=document.getElementById('cfgRuc').value.trim();
  const exchangeRate=Number(document.getElementById('cfgExchangeRate').value);
  const invoiceFooter=document.getElementById('cfgInvoiceFooter').value.trim();
  if(!businessName || !address || !phone || !ruc){ toast('Completa los datos obligatorios de la clínica'); return; }
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ toast('Escribe un correo electrónico válido'); return; }
  if(!Number.isFinite(exchangeRate) || exchangeRate<=0){ toast('Escribe un tipo de cambio válido'); return; }
  DB.settings={businessName,address,email,phone,ruc,exchangeRate:roundMoney(exchangeRate),invoiceFooter};
  saveDB();
  document.title=businessName+' — Sistema de Facturación';
  render();
  toast('Configuración guardada');
}

/* ================= REPORTES ================= */
function renderReportes(){
  const now = Date.now(); const day=86400000;
  const ranges = {today: now - (now % day), week: now - 7*day, month: now - 30*day, all: 0};
  const from = ranges[S.reportRange];
  const invF = DB.invoices.filter(i=>i.date>=from);

  const totalDental = invF.reduce((a,i)=>a+i.total,0);
  const methods=invF.reduce((totals,invoice)=>{ const split=paymentBreakdown(invoice);totals.cash+=split.cash;totals.card+=split.card;totals.transfer+=split.transfer;return totals; },{cash:0,card:0,transfer:0});

  return `
  <div id="generalReportPrint">
  <div class="print-document-title">Reporte general de la clínica</div>
  <div class="print-document-sub">Generado el ${new Date().toLocaleString('es-NI')}</div>
  ${printableContactHtml('clinic','letter')}
  <div class="filter-bar no-print">
    ${[['today','Hoy'],['week','7 días'],['month','30 días'],['all','Todo']].map(([k,l])=>`
      <button class="chip ${S.reportRange===k?'sel':''}" onclick="S.reportRange='${k}';render();">${l}</button>`).join('')}
    <span class="sb-spacer"></span>
    <button class="btn btn-outline btn-sm" onclick="printDocument('generalReportPrint')">${ICONS.print} Imprimir reporte</button>
    <button class="btn btn-outline btn-sm" onclick="exportCSV()">${ICONS.download} Exportar CSV</button>
  </div>

  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-label">Ingreso total dental</div><div class="kpi-value">${fmt(totalDental)}</div></div>
    <div class="kpi-card"><div class="kpi-label">${ICONS.invoice} Facturas</div><div class="kpi-value">${invF.length}</div><div class="kpi-delta flat">Solo clínica dental</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-head"><div class="card-title">Por método de pago</div></div>
      <div class="card-body">
        <div class="bar-row"><div class="bar-label">${ICONS.cash} Efectivo</div><div class="bar-track"><div class="bar-fill" style="width:${totalDental?methods.cash/totalDental*100:0}%;background:var(--ok)"></div></div><div class="bar-val">${fmt(methods.cash)}</div></div>
        <div class="bar-row"><div class="bar-label">${ICONS.card} Tarjeta</div><div class="bar-track"><div class="bar-fill" style="width:${totalDental?methods.card/totalDental*100:0}%;background:#3457D5"></div></div><div class="bar-val">${fmt(methods.card)}</div></div>
        <div class="bar-row"><div class="bar-label">Transferencia</div><div class="bar-track"><div class="bar-fill" style="width:${totalDental?methods.transfer/totalDental*100:0}%;background:var(--amber)"></div></div><div class="bar-val">${fmt(methods.transfer)}</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Servicios dentales más vendidos</div></div>
      <div class="card-body">
        ${topItems(invF).map(([name,val],idx)=>`
          <div class="bar-row"><div class="bar-label" style="width:150px;">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${val.pct}%;background:var(--teal)"></div></div><div class="bar-val">${fmt(val.total)}</div></div>
        `).join('') || emptyState('Sin datos','No hay facturas en este rango')}
      </div>
    </div>
  </div>
  </div>
  `;
}
function topItems(invoices){
  const map = {};
  invoices.forEach(i=>i.items.forEach(l=>{
    map[l.name] = (map[l.name]||0) + l.price*l.qty;
  }));
  const arr = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max = Math.max(1,...arr.map(a=>a[1]));
  return arr.map(([name,total])=>[name,{total,pct: total/max*100}]);
}
function exportCSV(){
  let rows = [['Tipo','Folio','Fecha','Referencia','Método','Total']];
  DB.invoices.forEach(i=>rows.push(['Dental',i.id,new Date(i.date).toLocaleString('es-NI'),i.patient,i.method,i.total.toFixed(2)]));
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='dic_reporte.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Reporte exportado');
}

/* ---------- INIT ---------- */
document.title=businessName()+' — Sistema de Facturación';
render();
</script>
